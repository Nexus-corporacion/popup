<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RSI Heatmap</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body style="background:#0a0f1c;color:white;padding:20px">

<h1 style="color:#22d3ee;text-align:center">
RSI Heatmap PRO
</h1>

<button onclick="start()">START</button>
<button onclick="stop()">STOP</button>

<h2>Heatmap</h2>
<div id="map" style="display:grid;grid-template-columns:repeat(6,1fr);gap:5px"></div>

<script>

let stats = Array.from({length:24},()=>0);
let interval;

function scan(){
  let hour = new Date().getUTCHours();

  // simulación segura
  if(Math.random() > 0.7){
    stats[hour]++;
  }

  render();
}

function render(){
  const map = document.getElementById("map");
  map.innerHTML = "";

  let max = Math.max(...stats) || 1;

  for(let i=0;i<24;i++){

    let intensity = stats[i]/max;
    let color = `rgba(239,68,68,${intensity})`;

    let div = document.createElement("div");
    div.style.background = color;
    div.style.padding = "10px";
    div.style.textAlign = "center";

    div.innerHTML = i + ":00<br>" + stats[i];

    map.appendChild(div);
  }
}

function start(){
  if(interval) clearInterval(interval);
  interval = setInterval(scan,2000);
}

function stop(){
  clearInterval(interval);
}

</script>

</body>
</html>
