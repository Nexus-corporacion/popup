<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ventana Siempre al Frente</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background-color: #0b0f19;
        color: #f1f5f9;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .panel {
        background-color: #111827;
        border: 1px solid #1f2937;
        border-radius: 12px;
        padding: 24px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        text-align: center;
      }
      h1 {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      p {
        font-size: 13px;
        color: #9ca3af;
        margin-bottom: 20px;
      }
      .form {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      input {
        background-color: #030712;
        border: 1px solid #374151;
        color: #ffffff;
        padding: 12px 14px;
        border-radius: 8px;
        outline: none;
        font-size: 14px;
        width: 100%;
        text-align: center;
      }
      input:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
      }
      button {
        background-color: #6366f1;
        color: #ffffff;
        border: none;
        padding: 12px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        font-size: 14px;
        transition: background-color 0.15s;
      }
      button:hover {
        background-color: #4f46e5;
      }
      .footer-note {
        margin-top: 16px;
        font-size: 11px;
        color: #6b7280;
        line-height: 1.4;
      }
      .error-msg {
        background-color: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.2);
        color: #fca5a5;
        padding: 10px;
        border-radius: 6px;
        font-size: 12px;
        margin-top: 14px;
        display: none;
      }
    </style>
  </head>
  <body>

    <div class="panel">
      <h1>Ventana Siempre al Frente</h1>
      <p>Abre un panel flotante real del sistema que nunca se oculta tras otras pestañas o programas</p>
      
      <div class="form">
        <input type="text" id="url" placeholder="Escribe o pega una URL..." required autocomplete="off" />
        <button onclick="launchAlwaysOnTop()">Abrir Ventana Flotante</button>
      </div>

      <div id="error-box" class="error-msg"></div>

      <div class="footer-note">
        Utiliza la tecnología de visualización nativa <strong>Document Picture-in-Picture</strong> para anclar el panel en primer plano absoluto. Es redimensionable y movible por toda tu pantalla.
      </div>
    </div>

    <script>
      function cleanURL(url) {
        let u = url.trim();
        if (!u) return '';
        if (!/^https?:\/\//i.test(u)) {
          u = 'https://' + u;
        }
        return u;
      }

      async function launchAlwaysOnTop() {
        const urlInput = document.getElementById('url');
        const errorBox = document.getElementById('error-box');
        const url = cleanURL(urlInput.value);

        errorBox.style.display = 'none';

        if (!url) {
          showError('Por favor, escribe una URL válida.');
          return;
        }

        // Comprobar si el navegador soporta Document Picture-in-Picture (Always on top real del sistema)
        if ('documentPictureInPicture' in window) {
          try {
            // Solicitar la ventana especial PiP
            const pipWindow = await window.documentPictureInPicture.requestWindow({
              width: 800,
              height: 600,
            });

            // Aplicar estilos sobre la nueva ventana flotante creada por el sistema operativo
            const style = pipWindow.document.createElement('style');
            style.textContent = `
              * { box-sizing: border-box; margin: 0; padding: 0; }
              body, html { width: 100vw; height: 100vh; overflow: hidden; background: #000; }
              iframe { width: 100%; height: 100%; border: none; display: block; }
            `;
            pipWindow.document.head.appendChild(style);

            // Crear el visor iframe apuntando al enlace web
            const iframe = pipWindow.document.createElement('iframe');
            iframe.src = url;
            iframe.referrerPolicy = 'no-referrer';
            
            pipWindow.document.body.appendChild(iframe);

          } catch (err) {
            console.error(err);
            showError('Habilita los permisos si lo solicita el navegador para lanzar la ventana.');
          }
        } else {
          // Fallback clásico de ventana popup si no se soporta la tecnología Picture-in-Picture
          showError('Tu navegador no soporta la API Picture-in-Picture para mantener ventanas siempre arriba. Creando ventana emergente tradicional...');
          
          const w = 800;
          const h = 600;
          const left = window.screen.width / 2 - w / 2;
          const top = window.screen.height / 2 - h / 2;
          const features = `width=${w},height=${h},top=${top},left=${left},resizable=yes,scrollbars=yes`;
          
          const popup = window.open(url, '_blank', features);
          if (popup) {
            popup.focus();
          } else {
            showError('Bloqueador de ventanas detectado. Por favor, concede permisos de ventanas emergentes.');
          }
        }
      }

      function showError(msg) {
        const errorBox = document.getElementById('error-box');
        errorBox.textContent = msg;
        errorBox.style.display = 'block';
      }
    </script>
  </body>
</html>
